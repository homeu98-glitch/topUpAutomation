<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>交易截圖上傳</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="customer-page auth-booting">
    <div class="page compact-page">
      <header class="hero hero-compact customer-hero">
        <div>
          <h1>充值上傳</h1>
          <p class="subtitle">上傳截圖並送交店主審核。</p>
        </div>
        <div class="customer-hero-actions">
          <button id="customerReturnTopButton" class="icon-button" type="button" aria-label="返回澳門會員通">
            ✕
          </button>
          <label id="shopSelectWrapper" class="shop-picker hidden">
            <select id="shopSelect" class="text-input"></select>
          </label>
          <button id="customerMenuButton" class="icon-button hidden" type="button" aria-label="帳戶與紀錄">
            ☰
          </button>
        </div>
      </header>

      <section id="statusBanner" class="card status-banner hidden"></section>

      <section id="authBootCard" class="card loading-card">
        <div class="spinner"></div>
        <div>
          <h2>登入檢查中</h2>
          <p>系統正在確認主系統登入狀態，請稍候。</p>
        </div>
      </section>

      <section id="customerLoginCard" class="card login-card">
        <div class="section-header">
          <h2>登入</h2>
        </div>
        <div class="tab-bar auth-toggle">
          <button id="customerModeButton" class="tab-button active" type="button">客戶</button>
          <button id="ownerModeButton" class="tab-button" type="button">店主</button>
        </div>

        <div id="customerLoginPane">
          <p class="subtitle compact-subtitle">請輸入 8 位會員編號和 4 位密碼。</p>
          <div class="login-grid">
            <input id="memberCodeInput" class="text-input" type="text" inputmode="numeric" maxlength="8" placeholder="會員編號，例如 63936541" />
            <input id="customerPasswordInput" class="text-input" type="password" inputmode="numeric" maxlength="4" placeholder="4 位密碼，例如 1234" />
            <button id="customerLoginButton" class="primary-button" type="button">登入並開始上傳</button>
          </div>
        </div>

        <div id="ownerLoginPane" class="hidden">
          <p class="subtitle compact-subtitle">店主帳號為 8 位數字，密碼為 4 位數字。</p>
          <div class="login-grid">
            <input id="ownerCodeInput" class="text-input" type="text" inputmode="numeric" maxlength="8" placeholder="店主帳號，例如 60000000" />
            <input id="ownerPasswordInput" class="text-input" type="password" inputmode="numeric" maxlength="4" placeholder="4 位密碼，例如 0000" />
            <button id="ownerLoginButton" class="primary-button" type="button">登入店主後台</button>
          </div>
        </div>
      </section>

      <main id="customerPortal" class="hidden">
        <section id="introCard" class="card upload-card">
          <div class="upload-icon">＋</div>
          <h2>選擇交易截圖</h2>
          <p>點擊這裡選擇圖片（支援多選，最多 10 張）。</p>
        </section>

        <section id="selectedCard" class="card hidden">
          <div class="section-header">
            <div class="inline-title-group">
              <h2>已選圖片</h2>
              <span id="selectionCount" class="pill">0 張</span>
            </div>
            <button id="clearAllImagesButton" class="secondary-button" type="button">清空</button>
          </div>
          <div id="selectedPreviewList" class="selected-preview-list"></div>
          <p class="field-note" style="margin-top: 10px;">點擊空白位置可重新選擇圖片。</p>
        </section>

        <section id="loadingCard" class="card loading-card hidden">
          <div class="spinner"></div>
          <div>
            <h2>辨識中</h2>
            <p>系統正在壓縮圖片並分析交易資料，請稍候。</p>
          </div>
        </section>

        <section id="errorCard" class="card error-card hidden"></section>

        <section id="resultCard" class="hidden">
          <section id="submitStatusCard" class="card success-card hidden"></section>

          <div id="detailList" class="detail-list"></div>
        </section>

        <section class="card customer-return-card">
          <button id="customerReturnBottomButton" class="secondary-button full-width-button" type="button">返回澳門會員通</button>
        </section>

      </main>

    <input id="fileInput" type="file" accept="image/*" multiple hidden />

    <dialog id="imageDialog" class="image-dialog">
      <button id="closeDialogButton" class="dialog-close" type="button">關閉</button>
      <img id="dialogImage" alt="交易截圖放大預覽" />
    </dialog>

    <dialog id="customerDetailDialog" class="image-dialog detail-dialog">
      <button id="closeCustomerDetailButton" class="dialog-close" type="button">關閉</button>
      <div id="customerDetailContent" class="owner-detail-content"></div>
    </dialog>

    <dialog id="customerMenuDialog" class="image-dialog menu-dialog">
      <button id="closeCustomerMenuButton" class="dialog-close" type="button">關閉</button>
      <div class="section-header" style="margin-top: 6px;">
        <h2>帳戶</h2>
      </div>
      <section id="customerAccountSection" class="card compact-card" style="margin-top: 12px;">
        <div class="owner-item-grid">
          <span id="customerAccountLine">-</span>
        </div>
        <button id="customerMenuLogoutButton" class="link-danger" type="button">登出</button>
      </section>

      <div class="section-header" style="margin-top: 16px;">
        <h2>交易紀錄</h2>
        <button id="refreshCustomerTransactionsButton" class="secondary-button" type="button">重新整理</button>
      </div>
      <div id="customerTransactionList" class="transaction-list" style="margin-top: 12px;"></div>
    </dialog>

    <div id="customerBottomBar" class="bottom-bar hidden">
      <div class="bottom-bar-inner">
        <div>
          <div class="summary-label">交易總額</div>
          <div id="totalAmount" class="summary-value bottom-total">MOP 0.00</div>
        </div>
        <div class="bottom-bar-actions">
          <button id="customerReturnBarButton" class="secondary-button" type="button">返回澳門會員通</button>
          <button id="confirmResultButton" class="primary-button" type="button">確認送審</button>
        </div>
      </div>
    </div>

    <div id="customerLoadingOverlay" class="customer-loading-overlay hidden" aria-hidden="true">
      <div class="customer-loading-card">
        <div class="spinner"></div>
        <div>
          <h2 id="customerLoadingTitle">辨識中</h2>
          <p id="customerLoadingMessage">系統正在壓縮圖片並分析交易資料，請稍候。</p>
        </div>
      </div>
    </div>

    <script>
      window.APP_CONFIG = {
        apiBaseUrl: "https://top-up-automation.vercel.app",
      };
    </script>
    <script src="/app.js" type="module"></script>
  </body>
</html>
