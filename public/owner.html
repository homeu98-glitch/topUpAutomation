<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>店主管理後台</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/owner-mobile.css" media="screen and (max-width: 760px)" />
  </head>
  <body class="owner-page owner-auth-booting">
    <div class="page">
      <header class="hero hero-compact owner-hero">
        <div>
          <h1>店主後台</h1>
          <p class="subtitle">查看待審核交易、核准充值紀錄與統計。</p>
        </div>
        <div class="owner-hero-actions">
          <div id="ownerHeaderSession" class="header-session hidden">
            <span id="ownerShopBadge" class="pill">未登入</span>
            <button id="liveModeButton" class="secondary-button compact-toggle-button" type="button">Live Mode: Off</button>
            <span id="ownerLoginBadge" class="pill subtle-pill">-</span>
            <button id="autoApproveButton" class="secondary-button" type="button">設定自動核准</button>
            <button id="ownerLogoutButton" class="secondary-button" type="button">登出</button>
          </div>
        </div>
      </header>

      <section id="ownerStatusBanner" class="card status-banner hidden"></section>
      <section id="ownerErrorCard" class="card error-card hidden"></section>
      <section id="ownerAuthBootCard" class="card loading-card">
        <div class="spinner"></div>
        <div>
          <h2>登入檢查中</h2>
          <p>系統正在確認主系統登入狀態，請稍候。</p>
        </div>
      </section>

      <section id="ownerLoginCard" class="card login-card">
        <div class="section-header">
          <h2>請從澳門會員通進入</h2>
        </div>
        <p class="subtitle compact-subtitle">此頁面已改為 API / SSO 專用入口，不再提供手動登入。</p>
        <div class="owner-login-entry">
          <button id="ownerAccessReturnButton" class="primary-button" type="button">返回澳門會員通</button>
        </div>
      </section>

      <main id="ownerApp" class="hidden">
        <button id="mobileSearchFab" class="mobile-fab mobile-search-fab" type="button" aria-label="搜尋交易">🔍</button>
        <button id="mobileMenuFab" class="mobile-fab mobile-menu-fab" type="button" aria-label="店主功能選單">☰</button>

        <section class="mobile-owner-nav" aria-label="手機交易分頁">
          <button id="mobilePendingTabButton" class="mobile-nav-button active" type="button">
            待審核
            <span id="mobilePendingTabBadge" class="notification-badge hidden">0</span>
          </button>
          <button id="mobileHistoryTabButton" class="mobile-nav-button" type="button">歷史記錄</button>
        </section>

        <section id="dashboardCards" class="dashboard-grid"></section>

        <section class="card">
          <div class="list-toolbar">
            <div class="tab-bar">
              <button id="pendingTabButton" class="tab-button active" type="button">
                待審核
                <span id="pendingTabBadge" class="notification-badge hidden">0</span>
              </button>
              <button id="historyTabButton" class="tab-button" type="button">歷史紀錄</button>
            </div>
            <div class="owner-toolbar-actions">
              <div class="search-box">
                <input id="customerSearchInput" class="text-input" type="text" inputmode="numeric" placeholder="搜尋客戶號碼" />
                <button id="customerSearchButton" class="secondary-button" type="button">搜尋</button>
                <button id="customerSearchClearButton" class="secondary-button" type="button">清除</button>
              </div>
              <label class="page-size-picker">
                <span>每頁</span>
                <select id="pageSizeSelect" class="text-input">
                  <option value="20">20</option>
                  <option value="50">50</option>
                  <option value="100">100</option>
                  <option value="all">All</option>
                </select>
              </label>
              <button id="batchApproveButton" class="primary-button" type="button">批次核准</button>
              <button id="refreshDashboardButton" class="secondary-button" type="button">重新整理</button>
            </div>
          </div>
          <div class="table-wrapper">
            <table class="owner-table">
              <thead>
                <tr>
                  <th><input id="selectAllCheckbox" type="checkbox" /></th>
                  <th>提交時間</th>
                  <th>會員編號</th>
                  <th>圖片</th>
                  <th>圖片數</th>
                  <th>總額</th>
                  <th>狀態</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="transactionTableBody"></tbody>
            </table>
          </div>
          <div id="transactionList" class="hidden"></div>
          <div class="pagination-bar">
            <button id="prevPageButton" class="secondary-button" type="button">上一頁</button>
            <span id="paginationInfo" class="field-note">第 1 頁</span>
            <button id="nextPageButton" class="secondary-button" type="button">下一頁</button>
          </div>
        </section>
      </main>
    </div>

    <dialog id="ownerImageDialog" class="image-dialog">
      <button id="ownerCloseDialogButton" class="dialog-close" type="button">關閉</button>
      <img id="ownerDialogImage" alt="交易圖片預覽" />
    </dialog>

    <dialog id="ownerDetailDialog" class="image-dialog detail-dialog">
      <button id="ownerCloseDetailButton" class="dialog-close" type="button">關閉</button>
      <div id="ownerDetailContent" class="owner-detail-content"></div>
    </dialog>

    <dialog id="autoApproveDialog" class="image-dialog detail-dialog">
      <button id="closeAutoApproveDialogButton" class="dialog-close" type="button">關閉</button>
      <div class="owner-detail-content">
        <div class="section-header">
          <h3>自動核准設定</h3>
          <span id="autoApproveStateBadge" class="pill subtle-pill">未啟用</span>
        </div>
        <p class="detail-note" style="margin-top: 12px;">
          開啟後，系統會按你設定的秒數，自動核准已等待足夠時間的待審核交易。請先確認你了解自動核准風險。
        </p>
        <div class="detail-edit-summary">
          <label class="edit-field prominent-edit-field">
            <span>間隔</span>
            <div class="interval-input-row">
              <input id="autoApproveIntervalInput" class="text-input" type="number" min="1" step="1" value="300" />
              <span class="field-note">Second</span>
            </div>
          </label>
        </div>
        <div class="detail-dialog-actions" style="margin-top: 16px;">
          <button id="disableAutoApproveButton" class="secondary-button" type="button">停止自動核准</button>
          <button id="confirmAutoApproveButton" class="primary-button" type="button">確認啟動</button>
        </div>
      </div>
    </dialog>

    <dialog id="mobileOwnerMenuDialog" class="image-dialog detail-dialog mobile-owner-dialog">
      <button id="closeMobileOwnerMenuButton" class="dialog-close" type="button">關閉</button>
      <div class="owner-detail-content">
        <div class="section-header">
          <h3>店主功能</h3>
        </div>
        <div class="mobile-owner-menu-grid">
          <div class="mobile-owner-info-card">
            <span class="summary-label">店舖名稱</span>
            <strong id="mobileOwnerShopName">未登入</strong>
          </div>
          <div class="mobile-owner-info-card">
            <span class="summary-label">店主帳號</span>
            <strong id="mobileOwnerLogin">-</strong>
          </div>
        </div>
        <div class="mobile-owner-menu-actions">
          <button id="mobileMenuLiveModeButton" class="secondary-button" type="button">Live Mode: Off</button>
          <button id="mobileMenuAutoApproveButton" class="secondary-button" type="button">設定自動核准</button>
          <button id="mobileMenuRefreshButton" class="secondary-button" type="button">重新整理</button>
          <button id="mobileMenuBatchApproveButton" class="primary-button" type="button">批次核准</button>
          <button id="mobileMenuLogoutButton" class="secondary-button" type="button">登出</button>
        </div>
      </div>
    </dialog>

    <dialog id="mobileSearchDialog" class="image-dialog detail-dialog mobile-owner-dialog">
      <button id="closeMobileSearchDialogButton" class="dialog-close" type="button">關閉</button>
      <div class="owner-detail-content">
        <div class="section-header">
          <h3>搜尋客戶號碼</h3>
        </div>
        <div class="mobile-search-panel">
          <input id="mobileCustomerSearchInput" class="text-input" type="text" inputmode="numeric" placeholder="輸入客戶號碼" />
          <button id="mobileCustomerSearchButton" class="primary-button" type="button">搜尋</button>
          <button id="mobileCustomerSearchClearButton" class="secondary-button" type="button">清除</button>
        </div>
      </div>
    </dialog>

    <div id="ownerLoadingOverlay" class="owner-loading-overlay hidden" aria-hidden="true">
      <div class="owner-loading-card">
        <div class="spinner"></div>
        <p id="ownerLoadingText">正在刷新資料...</p>
      </div>
    </div>

    <script>
      window.APP_CONFIG = {
        apiBaseUrl: "https://top-up-automation.vercel.app",
      };
    </script>
    <script src="/owner.js" type="module"></script>
  </body>
</html>
