<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>店主管理後台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="owner-page">
    <div class="page">
      <header class="hero hero-compact">
        <div>
          <div class="eyebrow">Top Up Automation POC</div>
          <h1>店主後台</h1>
          <p class="subtitle">查看待審核交易、核准充值紀錄與統計。</p>
        </div>
        <a class="secondary-button nav-link" href="/">客戶入口</a>
      </header>

      <section id="ownerStatusBanner" class="card status-banner hidden"></section>
      <section id="ownerErrorCard" class="card error-card hidden"></section>

      <section id="ownerLoginCard" class="card login-card">
        <div class="section-header">
          <h2>店主登入</h2>
          <span class="pill">POC</span>
        </div>
        <div class="login-grid">
          <input id="ownerLoginInput" class="text-input" type="text" inputmode="numeric" maxlength="8" placeholder="8 位店主帳號，例如 60000000" />
          <input id="ownerPasswordInput" class="text-input" type="password" inputmode="numeric" maxlength="4" placeholder="4 位密碼，例如 0000" />
          <button id="ownerLoginButton" class="primary-button" type="button">登入後台</button>
        </div>
      </section>

      <main id="ownerApp" class="hidden">
        <section class="card">
          <div class="session-bar">
            <div class="session-info">
              <span id="ownerShopBadge" class="pill">未登入</span>
              <span id="ownerLoginBadge" class="pill subtle-pill">-</span>
            </div>
            <div class="session-actions">
              <label class="toggle-row">
                <span>自動核准</span>
                <input id="autoApproveToggle" type="checkbox" />
              </label>
              <button id="ownerLogoutButton" class="secondary-button" type="button">登出</button>
            </div>
          </div>
        </section>

        <section class="card">
          <div class="filter-bar">
            <div class="date-filters">
              <label>
                <span>開始日期</span>
                <input id="dateFromInput" class="text-input" type="date" />
              </label>
              <label>
                <span>結束日期</span>
                <input id="dateToInput" class="text-input" type="date" />
              </label>
            </div>
            <div class="owner-toolbar-actions">
              <label class="page-size-picker">
                <span>每頁</span>
                <select id="pageSizeSelect" class="text-input">
                  <option value="20">20</option>
                  <option value="50">50</option>
                  <option value="100">100</option>
                  <option value="all">All</option>
                </select>
              </label>
              <button id="batchApproveButton" class="primary-button" type="button">批次核准</button>
              <button id="refreshDashboardButton" class="secondary-button" type="button">重新整理</button>
            </div>
          </div>
        </section>

        <section id="dashboardCards" class="dashboard-grid"></section>

        <section class="card">
          <div class="tab-bar">
            <button id="pendingTabButton" class="tab-button active" type="button">待審核</button>
            <button id="historyTabButton" class="tab-button" type="button">歷史紀錄</button>
          </div>
          <div class="table-wrapper">
            <table class="owner-table">
              <thead>
                <tr>
                  <th><input id="selectAllCheckbox" type="checkbox" /></th>
                  <th>提交時間</th>
                  <th>會員編號</th>
                  <th>圖片</th>
                  <th>圖片數</th>
                  <th>總額</th>
                  <th>狀態</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="transactionTableBody"></tbody>
            </table>
          </div>
          <div id="transactionList" class="hidden"></div>
          <div class="pagination-bar">
            <button id="prevPageButton" class="secondary-button" type="button">上一頁</button>
            <span id="paginationInfo" class="field-note">第 1 頁</span>
            <button id="nextPageButton" class="secondary-button" type="button">下一頁</button>
          </div>
        </section>
      </main>
    </div>

    <dialog id="ownerImageDialog" class="image-dialog">
      <button id="ownerCloseDialogButton" class="dialog-close" type="button">關閉</button>
      <img id="ownerDialogImage" alt="交易圖片預覽" />
    </dialog>

    <script>
      window.APP_CONFIG = {
        apiBaseUrl: "https://top-up-automation.vercel.app",
      };
    </script>
    <script src="/owner.js" type="module"></script>
  </body>
</html>
